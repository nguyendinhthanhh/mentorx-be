spring:
  application:
    name: mentorx-api
  
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/mentorx_db}
    username: ${DB_USERNAME:mentorx_user}
    password: ${DB_PASSWORD:mentorx_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      connection-timeout: 20000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  cache:
    type: redis
    redis:
      time-to-live: 600000 # 10 minutes
    cache-names:
      - users
      - mentors
      - jobs
      - courses
      - match-scores

jwt:
  secret: ${JWT_SECRET:docker-jwt-secret-key-change-in-production}
  access-token-expiry: 900000 # 15 minutes
  refresh-token-expiry: 604800000 # 7 days
  issuer: mentorx-api

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
    allowed-methods: GET,POST,PUT,DELETE,PATCH,OPTIONS
    allowed-headers: "*"
    allow-credentials: true
  
  wallet:
    secret-key: ${WALLET_SECRET_KEY:docker-wallet-secret-key-change-in-production}
    cooling-off-period-hours: 72

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.mentorx.api: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"