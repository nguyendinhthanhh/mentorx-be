spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:postgres}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:}
    
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: localhost
    port: 1025 # MailHog for local testing
    username: 
    password: 
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: dev-secret-key-for-development-only-not-secure
  access-token-expiry: 3600000 # 1 hour for development

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173
  
  file:
    upload-dir: ./uploads-dev

logging:
  level:
    com.mentorx.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG

  database:
    seed-data: true