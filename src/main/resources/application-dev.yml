spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:mentorx_db}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:12345}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:421374526010-euk4tm97v4t877eeh4di44ea80079hg6.apps.googleusercontent.com}
            client-secret: ${GOOGLE_CLIENT_SECRET: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}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID:your-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:your-github-client-secret}
            scope: user:email,read:user
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${SMTP_HOST:${MAIL_HOST:smtp.gmail.com}}
    port: ${SMTP_PORT:${MAIL_PORT:587}}
    username: ${SMTP_USERNAME:${MAIL_USERNAME:}}
    password: ${SMTP_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:${MAIL_SMTP_AUTH:true}}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:${MAIL_SMTP_STARTTLS_ENABLE:true}}
            required: ${SMTP_STARTTLS_REQUIRED:${MAIL_SMTP_STARTTLS_REQUIRED:true}}
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

management:
  health:
    mail:
      enabled: false

jwt:
  secret: dev-secret-key-for-development-only-not-secure
  access-token-expiry: 3600000 # 1 hour for development

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173
  
  file:
    upload-dir: ./uploads-dev
  database:
    seed-data: true
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    com.mentorx.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
