spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:mentorx_db}}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:12345}
    
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${SMTP_HOST:${MAIL_HOST:smtp.gmail.com}}
    port: ${SMTP_PORT:${MAIL_PORT:587}}
    username: ${SMTP_USERNAME:${MAIL_USERNAME:}}
    password: ${SMTP_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:${MAIL_SMTP_AUTH:true}}
          starttls:
            enable: ${SMTP_STARTTLS_ENABLE:${MAIL_SMTP_STARTTLS_ENABLE:true}}
            required: ${SMTP_STARTTLS_REQUIRED:${MAIL_SMTP_STARTTLS_REQUIRED:true}}
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000

management:
  health:
    mail:
      enabled: false

jwt:
  secret: dev-secret-key-for-development-only-not-secure
  access-token-expiry: 3600000 # 1 hour for development

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://localhost:5173
  
  file:
    upload-dir: ./uploads-dev
  database:
    seed-data: true

logging:
  level:
    com.mentorx.api: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
