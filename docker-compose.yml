services:
  postgres:
    image: postgres:15-alpine
    container_name: mentorx-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mentorx_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentorx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mentorx-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - mentorx-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentorx-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mentorx_db}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      WALLET_SECRET_KEY: ${WALLET_SECRET_KEY}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - mentorx-network
    volumes:
      - app_uploads:/app/uploads
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mentorx-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mentorx.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    networks:
      - mentorx-network
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  app_uploads:

networks:
  mentorx-network:
    driver: bridge