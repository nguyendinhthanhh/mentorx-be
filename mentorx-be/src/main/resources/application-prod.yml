spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 900000 # 15 minutes
  refresh-token-expiry: 604800000 # 7 days

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  
  oauth2:
    authorized-redirect-uris: ${OAUTH2_AUTHORIZED_REDIRECT_URIS}
  
  file:
    upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}

  wallet:
    secret-key: ${WALLET_SECRET_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.mentorx.api: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.springframework.web: WARN
  file:
    name: /app/logs/mentorx-api.log